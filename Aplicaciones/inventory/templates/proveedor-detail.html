<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo|default:'Crear proveedor' }}</title>
    <style>
        body {
            font-size: 25px;
            text-align: center;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f5faff;
            padding: 32px 32px 24px 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-width: 350px;
            max-width: 400px;
        }
        input, textarea, button {
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 7px;
            border: 1px solid #b0b0b0;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        button {
            background-color: rgb(0, 102, 255);
            color: #fff;
            font-size: 22px;
            border: none;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        label {
            text-align: left;
            font-size: 18px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <h1>{{ titulo }}</h1>
    <div class="form-container">
        <form method="POST">
            {% csrf_token %}
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="Nombre" placeholder="Nombre" value="{{ proveedor.nombre}}" required>
            <label for="contacto">Contacto:</label>
            <input type="text" id="contacto" name="Contacto" placeholder="Contacto" value="{{ proveedor.contacto }}" required>
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="Telefono" placeholder="Teléfono" value="{{ proveedor.telefono }}" required>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="Email" placeholder="Correo electrónico" value="{{ proveedor.email }}" required>
            <label for="direccion">Dirección:</label>
            <textarea id="direccion" name="Direccion" placeholder="Dirección" required>{{ proveedor.direccion }}</textarea>
            <button type="submit">{{ boton_text }}</button>
        </form>
    </div>
    <br>
    {% if mensaje %}
        <p style="color: green; font-size: 20px;">{{ mensaje }}</p>
    {% endif %}
</body>
</html>
