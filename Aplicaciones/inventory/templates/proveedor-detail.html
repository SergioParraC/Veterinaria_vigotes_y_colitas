{% extends 'base/base.html' %}

{% block content %}

    <h1>{{ titulo }}</h1>
    <div class="form-container">
        <a href="{% url 'inventario:listado_proveedores' %}"><button style="background-color: rgb(255, 189, 102); color: black; margin-bottom: 10px;">Volver a listado de proveedores</button></a>
        <form method="POST">
            {% csrf_token %}
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="Nombre" placeholder="Nombre" value="{{ proveedor.nombre}}" required>
            <label for="contacto">Contacto:</label>
            <input type="text" id="contacto" name="Contacto" placeholder="Contacto" value="{{ proveedor.contacto }}" required>
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="Telefono" placeholder="Teléfono" value="{{ proveedor.telefono }}" required>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="Email" placeholder="Correo electrónico" value="{{ proveedor.email }}" required>
            <label for="direccion">Dirección:</label>
            <textarea id="direccion" name="Direccion" placeholder="Dirección" required>{{ proveedor.direccion }}</textarea>
            <button type="submit" style="background-color: rgb(0, 102, 255); color: #fff;">{{ boton_text }}</button>
        </form>
    </div>
    <br>
    {% if mensaje %}
        <p style="color: green; font-size: 20px;">{{ mensaje }}</p>
    {% endif %}
    {% if messages %}
    {% for message in messages %}
        <div style="color: {% if message.tags == 'success' %}green{% else %}red{% endif %}; font-size: 20px; margin-bottom: 10px;">
        {{ message }}
        </div>
    {% endfor %}
    {% endif %}

{% endblock %}
