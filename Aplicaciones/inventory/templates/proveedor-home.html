<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores</title>
    <style>
        body { 
            font-size: 25px;
            text-align: center;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
            border: 1px solid #000000;
        }
        th, td {
            padding: 8px 16px;
            border: 1px solid #000000;
        }
        button {
            padding: 8px 16px;
            font-size: 25px;
            border-radius: 7px;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        th {
            background-color: rgb(168, 208, 255);
            color: #000000;
        }
    </style>
</head>
<body>
<h1>Proveedores registrados</h1>
    <div style="margin-bottom: 10px;">
        <div>
            <button style="background-color: rgb(255, 92, 92);">PDF</button>
            <button style="background-color: rgb(53, 255, 70);">Añadir</button>
            <button style="background-color: rgb(255, 189, 102);">Filtrar</button>
            <button style="background-color: rgb(102, 178, 255);">Actualizar</button>
        </div>
    </div>
    <div style="display: inline-block; margin-left: auto; margin-right: auto;">
        <table>
            <tr>
                <th>Nombre</th>
                <th>Contacto</th>
                <th>Teléfono</th>
                <th>Correo electrónico</th>
                <th>Dirección</th>
                <th>Editar proveedor</th>
            </tr>
            {% for prov in Proveedores %}
            <tr>
                <td>{{ prov.nombre }}</td>
                <td>{{ prov.contacto }}</td>
                <td>{{ prov.telefono }}</td>
                <td>{{ prov.email }}</td>
                <td>{{ prov.direccion }}</td>
                <td><a href="{% url 'editar_proveedor' prov.id %}">Editar</a></td>
            </tr>
            {% endfor %}
        </table>
        <p style="font-size: 30px; text-align: left;"><strong>Cantidad total de proveedores: {{ Total }}</strong></p>
    </div>
</body>
</html>
