<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titlePage }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3fbf7;
            color: #263238;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #0f5f55;
            padding: 1rem 0;
            box-shadow: 0 2px 14px rgba(15,95,85,0.18);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .brand img {
            height: 84px;
            border-radius: 8px;
            background-color: #ffffff;
            padding: 4px;
        }

        h1 {
            color: #0f5f55;
            font-size: 34px;
        }

        header h1 {
            margin: 0;
            color: #ffffff;
        }

        nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 260px;
        }

        nav button {
            width: 100%;
            padding: 8px 10px;
            font-size: 16px;
        }

        .menu-toggle {
            display: none;
        }

        .menu-button {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 7px;
            border: none;
            background-color: #2f9e8f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(47,158,143,0.28);
        }

        .menu {
            position: relative;
        }

        .menu-links {
            display: none;
            position: absolute;
            right: 0;
            top: 44px;
            width: 220px;
            background: #ffffff;
            border: 1px solid #b8ded7;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 8px 22px rgba(15,95,85,0.18);
            z-index: 10;
        }

        .menu-links a {
            display: block;
            margin-bottom: 8px;
        }

        .menu-links a:last-child {
            margin-bottom: 0;
        }

        .menu-toggle:checked + .menu-button + .menu-links {
            display: block;
        }

        a {
            text-decoration: none;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
            border: 1px solid #b8ded7;
            background: #ffffff;
            box-shadow: 0 4px 14px rgba(15,95,85,0.08);
        }
        th, td {
            padding: 8px 16px;
            border: 1px solid #b8ded7;
        }
        td {
            font-size: 18px;
        }
        th {
            background-color: #e8f6f2;
            color: #0f5f55;
            font-size: 18px;
        }
        .form-container,
        .form-delete {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-container form {
            background: #ffffff;
            padding: 32px 32px 24px 32px;
            border: 1px solid #b8ded7;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(15,95,85,0.08);
            min-width: 350px;
            max-width: 400px;
        }

        .form-delete form {
            background: transparent;
            padding: 0;
            box-shadow: none;
            min-width: auto;
            max-width: none;
            width: auto;
        }
        .search-wrap { 
            width: 100%; 
            padding: 0 24px; 
            box-sizing: border-box; 
        }

        .search-form { 
            display: grid; 
            grid-template-columns: repeat(5, minmax(200px, 1fr)); 
            gap: 12px; 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background: transparent; 
            box-shadow: none; 
            padding: 0; 
            align-items: end;
        }

        .search-form .f { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }

        .search-form button { 
            grid-column: 5 / 6; 
            justify-self: stretch;
            align-self: end;
            margin-top: 0;
        }

        input, select, textarea {
            font-size: 17px;
            padding: 8px 12px;
            border-radius: 7px;
            border: 1px solid #b8ded7;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        button {
            padding: 8px 14px;
            border-radius: 7px;
            border: none;
            background-color: #2f9e8f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(47,158,143,0.28);
        }
        button:hover {
            background-color: #247f73;
        }
        label {
            text-align: left;
            font-size: 18px;
            margin-bottom: 2px;
            color: #0f5f55;
            font-weight: bold;
        }
        img {
            display: block;
            margin: 0 auto 4px auto;
            max-width: 200px;
            border-radius: 8px;
        }

        @media (max-width: 800px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 14px;
            }

            nav {
                justify-content: center;
                max-width: 100%;
            }

            .menu-links {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
            }

            .search-form {
                grid-template-columns: 1fr;
            }

            .search-form button {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>

    {% block header %}
        {% include "base/header.html" %}
    {% endblock %}

    <div style="flex: 1 0 auto; display: flex; flex-direction: column;">
        {% block content %}
        {% endblock %}
    </div>

    <div style="flex-shrink: 0;">
        {% block footer %}
            {% include "base/footer.html" %}
        {% endblock %}
    </div>
</body>
</html>
