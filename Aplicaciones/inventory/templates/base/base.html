<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titlePage }}</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-size: 25px;
            text-align: center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
            border: 1px solid #000000;
        }
        th, td {
            padding: 8px 16px;
            border: 1px solid #000000;
        }
        td {
            font-size: 21px;
        }
        th {
            background-color: #acffaf;
            color: #000000;
        }
        .form-container,
        .form-delete {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-container form {
            background: #cfffd181;
            padding: 32px 32px 24px 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-width: 350px;
            max-width: 400px;
        }

        .form-delete form {
            background: transparent;
            padding: 0;
            box-shadow: none;
            min-width: auto;
            max-width: none;
            width: auto;
        }
        .search-wrap { 
            width: 100%; 
            padding: 0 24px; 
            box-sizing: border-box; 
        }

        .search-form { 
            display: grid; 
            grid-template-columns: repeat(5, minmax(200px, 1fr)); 
            gap: 12px; 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background: transparent; 
            box-shadow: none; 
            padding: 0; 
            align-items: end;
        }

        .search-form .f { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }

        .search-form button { 
            grid-column: 5 / 6; 
            justify-self: stretch;
            align-self: end;
            margin-top: 0;
        }

        input, select, textarea {
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 7px;
            border: 1px solid #b0b0b0;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        button {
            padding: 6px 12px;
            border-radius: 7px;
            border: none;
            margin-top: 10px;
            background-color: rgb(20, 97, 5);
            color: white;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        input[type="file"] {
            font-size: 18px;
        }
        button {
            font-size: 22px;
            border: none;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        label {
            text-align: left;
            font-size: 18px;
            margin-bottom: 2px;
        }
        img {
            display: block;
            margin: 0 auto 4px auto;
            max-width: 200px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    {% block header %}
        {% include "base/header.html" %}
    {% endblock %}

    <div style="flex: 1 0 auto; display: flex; flex-direction: column;">
        {% block content %}
        {% endblock %}
    </div>

    <div style="flex-shrink: 0;">
        {% block footer %}
            {% include "base/footer.html" %}
        {% endblock %}
    </div>
</body>
</html>
