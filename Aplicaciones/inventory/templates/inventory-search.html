
{% extends "base/base.html" %}

{% block content %}
    <h1>Búsqueda de productos</h1>
    <div class="form-container">
        <a href="{% url 'inventario:listado_productos' %}"><button style="background-color: rgb(255, 189, 102); color: black">Volver a Productos</button></a>
        <form method="get" action="{% url 'inventario:filtrar_productos' %}">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre del producto">

            <label for="categoria">Categoría:</label>
            <select id="categoria" name="categoria">
                <option value="">Todas</option>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                {% endfor %}
            </select>

            <label for="precio_min">Precio mínimo:</label>
            <input type="number" id="precio_min" name="precio_min" min="0" step="0.01" placeholder="Ej: 100">

            <label for="precio_max">Precio máximo:</label>
            <input type="number" id="precio_max" name="precio_max" min="0" step="0.01" placeholder="Ej: 500">

            <button type="submit" style="background-color: rgb(0, 102, 255); color: white">Buscar</button>
        </form>
    </div>
{% endblock %}
