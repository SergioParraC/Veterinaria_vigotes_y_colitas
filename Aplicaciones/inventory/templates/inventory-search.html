<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de productos</title>
    <style>
        body {
            font-size: 25px;
            text-align: center;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f5faff;
            padding: 32px 32px 24px 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-width: 350px;
            max-width: 400px;
        }
        input, select, button {
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 7px;
            border: 1px solid #b0b0b0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: rgb(0, 102, 255);
            color: #fff;
            font-size: 22px;
            border: none;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        label {
            text-align: left;
            font-size: 18px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <h1>Búsqueda de productos</h1>
    <div class="form-container">
        <form method="get" action="{% url 'filtrar_productos' %}">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre del producto">

            <label for="categoria">Categoría:</label>
            <select id="categoria" name="categoria">
                <option value="">Todas</option>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                {% endfor %}
            </select>

            <label for="precio_min">Precio mínimo:</label>
            <input type="number" id="precio_min" name="precio_min" min="0" step="0.01" placeholder="Ej: 100">

            <label for="precio_max">Precio máximo:</label>
            <input type="number" id="precio_max" name="precio_max" min="0" step="0.01" placeholder="Ej: 500">

            <button type="submit">Buscar</button>
        </form>
    </div>
</body>
</html>
