<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto</title>
    <style>
        body {
            font-size: 25px;
            text-align: center;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f5faff;
            padding: 32px 32px 24px 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-width: 350px;
            max-width: 400px;
        }
        input, select, button {
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 7px;
            border: 1px solid #b0b0b0;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="file"] {
            font-size: 18px;
        }
        button {
            background-color: rgb(0, 102, 255);
            color: #fff;
            font-size: 22px;
            border: none;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.8;
            cursor: pointer;
        }
        label {
            text-align: left;
            font-size: 18px;
            margin-bottom: 2px;
        }
        img {
            display: block;
            margin: 0 auto 10px auto;
            max-width: 200px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>{{ titulo }}</h1>
    <div class="form-container">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="Nombre" placeholder="Nombre" value="{{ producto.nombre }}" required>
            <label for="categoria">Categoría:</label>
            <select id="categoria" name="Categoria">
                <option value="">Seleccione una categoria</option>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}" {% if cat.id == producto.categoria.id %}selected{% endif %}>{{ cat.descripcion }}</option>
                {% endfor %}
            </select>
            <label for="proveedor">Proveedor:</label>
            <select id="proveedor" name="Proveedor">
                <option value="">Seleccione un proveedor</option>
                {% for prov in proveedores %}
                    <option value="{{ prov.id }}" {% if prov.id == producto.proveedor.id %}selected{% endif %}>{{ prov.nombre }}</option>
                {% endfor %}
            </select>
            <label for="descripcion">Descripción:</label>
            <input type="text" id="descripcion" name="Descripcion" placeholder="Descripcion" value="{{ producto.descripcion }}" required>
            <label for="precio">Precio:</label>
            <input type="text" id="precio" name="Precio" placeholder="Precio" value="{{ producto.precio }}" required>
            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="Stock" placeholder="Stock" value="{{ producto.stock }}" step="1" required>
            <label for="imagen">Imagen:</label>
            <input type="file" id="imagen" name="Imagen" {% if not producto.img %}required{% endif %}>
            {% if producto.img %}
                <img src="{{ producto.img.url }}" alt="Imagen del producto" width="200">
            {% endif %}
            <button type="submit">{{ boton }}</button>
        </form>
    </div>
    <br>
    {% if mensaje %}
        <p style="color: green; font-size: 20px;">{{ mensaje }}</p>
    {% endif %}
</body>
</html>
