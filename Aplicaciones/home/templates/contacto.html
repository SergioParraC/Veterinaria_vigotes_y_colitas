<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titlePage }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3fbf7;
            color: #263238;
            text-align: center;
        }

        header {
            background: #0f5f55;
            padding: 1rem 0;
            box-shadow: 0 2px 14px rgba(15,95,85,0.18);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand img {
            height: 84px;
            border-radius: 8px;
            background-color: #ffffff;
            padding: 4px;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            color: #ffffff;
        }

        nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        a {
            text-decoration: none;
        }

        button {
            padding: 8px 14px;
            border-radius: 7px;
            border: none;
            background-color: #2f9e8f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(47,158,143,0.28);
        }

        button:hover {
            background-color: #247f73;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 38px 24px;
        }

        .contact {
            background: #ffffff;
            border: 1px solid #b8ded7;
            border-radius: 8px;
            padding: 22px;
            text-align: left;
            box-shadow: 0 4px 14px rgba(15,95,85,0.08);
        }

        .contact h2 {
            margin: 0 0 10px;
            color: #0f5f55;
            font-size: 30px;
        }

        .contact p {
            font-size: 18px;
            line-height: 1.4;
        }

        .contact form p {
            margin: 0 0 14px;
        }

        .contact label {
            display: block;
            margin-bottom: 6px;
            color: #0f5f55;
            font-weight: bold;
        }

        .contact input,
        .contact textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #b8ded7;
            border-radius: 7px;
            font-family: Arial, sans-serif;
            font-size: 17px;
        }

        .contact textarea {
            resize: vertical;
        }

        .contact-message {
            color: #0f5f55;
            font-weight: bold;
        }

        footer {
            background: #0f5f55;
            color: #ffffff;
            padding: 1.5rem 0;
            margin-top: 2rem;
            box-shadow: 0 -2px 14px rgba(15,95,85,0.18);
            font-size: 16px;
        }

        @media (max-width: 800px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/006/470/430/small/modern-animal-pet-logo-template-free-vector.jpg" alt="Logo Veterinaria">
                <h1>{{ titulo }}</h1>
            </div>
            <nav>
                <a href="/"><button>Inicio</button></a>
                <a href="/pets/"><button>Mascotas</button></a>
                <a href="/inventario/"><button>Productos</button></a>
                <a href="/contacto/"><button>Contacto</button></a>
                <a href="/login/"><button>Inicio de sesión</button></a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact">
            <h2>Contacto</h2>
            <p>Déjanos tus datos y nos comunicaremos contigo.</p>

            {% if mensaje_contacto %}
                <p class="contact-message">{{ mensaje_contacto }}</p>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ formulario_contacto.as_p }}
                <button type="submit">Enviar contacto</button>
            </form>
        </section>
    </main>

    <footer>
        <strong>Veterinaria Vida Animal</strong>
        <div>2026 - Todos los derechos reservados.</div>
    </footer>
</body>
</html>
