<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titlePage }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3fbf7;
            color: #263238;
            text-align: center;
        }

        header {
            background: #0f5f55;
            padding: 1rem 0;
            box-shadow: 0 2px 14px rgba(15,95,85,0.18);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            color: #ffffff;
        }

        main {
            max-width: 520px;
            margin: 0 auto;
            padding: 38px 24px;
        }

        form {
            background: #ffffff;
            border: 1px solid #b8ded7;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 14px rgba(15,95,85,0.08);
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #0f5f55;
            font-size: 17px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 10px;
            border: 1px solid #b8ded7;
            border-radius: 7px;
            font-size: 17px;
        }

        input[type="checkbox"] {
            width: auto;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        p {
            margin: 0 0 14px;
        }

        button {
            padding: 8px 14px;
            border-radius: 7px;
            border: none;
            background-color: #2f9e8f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(47,158,143,0.28);
        }

        button:hover {
            background-color: #247f73;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        a {
            text-decoration: none;
        }

        .errorlist {
            color: #b91c1c;
            font-size: 15px;
            margin: 0 0 8px;
            padding-left: 18px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>{{ titulo }}</h1>
            <a href="/pets/"><button type="button">Volver a mascotas</button></a>
        </div>
    </header>

    <main>
        <form method="POST">
            {% csrf_token %}
            {{ formulario.as_p }}
            <div class="actions">
                <button type="submit">{{ boton }}</button>
                <a href="/pets/"><button type="button">Cancelar</button></a>
            </div>
        </form>
    </main>
</body>
</html>
